<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Cream background, full canvas -->
  <rect width="1024" height="1024" fill="#F5EFE6"/>

  <!-- Artwork from cadence-logo-retrosun.svg, centered and scaled to fit a square icon
       with breathing room. Original content bounds in 512 space were roughly
       x [65, 447], y [65, 386] — wider than tall, sitting in the upper portion of the
       canvas. We center it visually and scale up to fill the icon nicely.

       Translate to icon center (512, 512), scale ~1.7 around original center (256, 225).
       Final transform: translate(512, 512) scale(1.7) translate(-256, -225) -->
  <g transform="translate(512, 512) scale(1.7) translate(-256, -225)">
    <!-- Sun rays -->
    <g stroke="#B8410E" stroke-width="13" stroke-linecap="round">
      <line x1="102" y1="215" x2="65" y2="205"/>
      <line x1="143" y1="143" x2="116" y2="116"/>
      <line x1="215" y1="102" x2="205" y2="65"/>
      <line x1="297" y1="102" x2="307" y2="65"/>
      <line x1="369" y1="143" x2="396" y2="116"/>
      <line x1="411" y1="215" x2="447" y2="205"/>
    </g>

    <defs>
      <clipPath id="sunClip">
        <circle cx="256" cy="256" r="130"/>
      </clipPath>
    </defs>

    <!-- Filled sun -->
    <circle cx="256" cy="256" r="130" fill="#B8410E"/>

    <!-- Retro horizontal bands eroding the lower half -->
    <g clip-path="url(#sunClip)">
      <rect x="120" y="264" width="272" height="8" fill="#F5EFE6"/>
      <rect x="120" y="282" width="272" height="10" fill="#F5EFE6"/>
      <rect x="120" y="300" width="272" height="13" fill="#F5EFE6"/>
      <rect x="120" y="320" width="272" height="15" fill="#F5EFE6"/>
      <rect x="120" y="341" width="272" height="17" fill="#F5EFE6"/>
      <rect x="120" y="363" width="272" height="23" fill="#F5EFE6"/>
    </g>
  </g>
</svg>
